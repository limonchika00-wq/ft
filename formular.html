<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="utf-8">
    <title>Môj obľúbený citát</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h1 class="nadpis mt-4">
        <i class="bi bi-pencil-fill"></i>
        Podeľte sa o svoj obľúbený citát
    </h1>

    <p class="popis">
        Napíšte svoj obľúbený citát a podeľte sa o inšpiráciu s ostatnými návštevníkmi stránky.
    </p>

    <div class="card p-4 formular text-start mt-3" id="formularBox">

        <form onsubmit="odoslatFormular(event)">

            <label for="meno">
                <i class="bi bi-person-fill"></i>
                Meno
            </label>

            <input class="form-control" id="meno" type="text" placeholder="Zadajte svoje meno" required>

            <br>

            <label for="email">
                <i class="bi bi-envelope-fill"></i>
                E-mail
            </label>

            <input class="form-control" id="email" type="email" required placeholder="Zadajte svoj e-mail">

            <br>

            <label for="citat">
                <i class="bi bi-chat-quote-fill"></i>
                Váš obľúbený citát
            </label>

            <input class="form-control" id="citat" type="text" placeholder="Napíšte citát" required>

            <br>

            <label for="kategoria">
                <i class="bi bi-bookmark-fill"></i>
                Kategória
            </label>

            <select class="form-select" id="kategoria">
                <option>Motivácia</option>
                <option>Život</option>
                <option>Úspech</option>
                <option>Šťastie</option>
            </select>

            <br>

            <button class="btn btn-primary" type="submit">
                <i class="bi bi-send-fill"></i>
                Odoslať
            </button>

        </form>

    </div>

    <p class="mt-4">
        <a href="index.html" class="mojeTlacidlo text-decoration-none">
            <i class="bi bi-house-fill"></i>
            Späť na hlavnú stránku
        </a>
    </p>

</div>

<script src="js/script.js"></script>

</body>
</html>
